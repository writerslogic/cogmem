name: Publish

# Publishes cogmem to PyPI via Trusted Publishing (OIDC — no API token stored).
# Register the trusted publisher on PyPI with:
#   owner: writerslogic | repository: cogmem | workflow: publish.yml | environment: pypi
# Fires when a GitHub Release is published (tag the release v<version>, matching
# the version in pyproject.toml). workflow_dispatch allows a manual re-run.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Verify the wheel imports and the console script is present
        run: |
          pip install dist/*.whl
          python -c "import cogmem; print('cogmem', cogmem.__version__)"
          cogmem --help >/dev/null 2>&1 || true
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

      # Publish metadata to the official MCP Registry via the workflow OIDC token
      # (id-token: write, granted above). server.json's version is stamped from
      # the release tag so it matches the PyPI package the registry verifies against.
      - name: Publish to MCP Registry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const s=JSON.parse(fs.readFileSync('server.json'));s.version='${VERSION}';s.packages.forEach(p=>p.version='${VERSION}');fs.writeFileSync('server.json',JSON.stringify(s,null,2)+'\n')"
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
